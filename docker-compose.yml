# Runs on the Hetzner box. The app binds to localhost only; nginx terminates TLS
# and reverse-proxies /vault/ to it. Documents + vector index come from the mounted
# /data volume (read-only for the app). The image is code only.
services:
  app:
    image: ghcr.io/sabihusman/mba-vault:latest
    container_name: mba-vault
    restart: unless-stopped
    # Bind to loopback so the app is never directly exposed — only via nginx.
    ports:
      - "127.0.0.1:3000:3000"
    env_file:
      - .env
    volumes:
      - /data:/data:ro
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "fetch('http://127.0.0.1:3000/vault/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
