# Build the app image and (on push to main) publish it to GHCR.
#
# The SSH deploy job that pulls the image on the Hetzner box is added once Docker
# is installed there and the deploy secrets exist (see SECURITY.md / task 14). For
# now this validates the Dockerfile on every PR and publishes on merge to main.
name: deploy

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read
  packages: write

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  image:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      # Only log in / push on merges to main; PRs just build to validate.
      - name: Log in to GHCR
        if: github.event_name == 'push'
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build (and push on main)
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: ./Dockerfile
          push: ${{ github.event_name == 'push' }}
          tags: |
            ghcr.io/sabihusman/mba-vault:latest
            ghcr.io/sabihusman/mba-vault:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
