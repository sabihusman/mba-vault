# Build the app image, publish it to GHCR on merge to main, then SSH to the box
# and redeploy. The deploy step authenticates with a DEDICATED, passphraseless key
# whose server-side authorized_keys entry pins a forced command (deploy.sh) — so a
# leaked CI key can only trigger a redeploy, nothing else. See SECURITY.md §4.
name: deploy

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read
  packages: write

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  image:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      # Only log in / push on merges to main; PRs just build to validate.
      - name: Log in to GHCR
        if: github.event_name == 'push'
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build (and push on main)
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: ./Dockerfile
          push: ${{ github.event_name == 'push' }}
          tags: |
            ghcr.io/sabihusman/mba-vault:latest
            ghcr.io/sabihusman/mba-vault:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Pull the freshly-pushed image on the Hetzner box and restart the container.
  # Only runs on merges to main, after the image is published. Uses raw OpenSSH
  # (no third-party action) with a pinned host key and a forced-command deploy key.
  deploy:
    needs: image
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Redeploy over SSH
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_KNOWN_HOSTS: ${{ secrets.SSH_KNOWN_HOSTS }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          printf '%s\n' "$SSH_KNOWN_HOSTS" > ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts
          # The command we send is ignored — sshd runs the forced deploy.sh — but
          # we pass one anyway for clarity in the server's auth log.
          ssh -i ~/.ssh/deploy_key -o IdentitiesOnly=yes \
              -o BatchMode=yes -o ConnectTimeout=15 \
              "$SSH_USER@$SSH_HOST" deploy
