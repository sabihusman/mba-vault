# Required status check: "test"
#   - Vitest unit tests (chunking + retrieval)
#   - Playwright E2E including a mobile-viewport project
name: test

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
      # `npm install` (not `npm ci`) — see build.yml: cross-platform native binaries.
      - run: npm install --no-audit --no-fund

      # Unit tests across both workspaces
      - run: npm run test:unit

      # E2E: install the browser, then run desktop + mobile-chrome projects
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e

      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: app/playwright-report/
          retention-days: 7
