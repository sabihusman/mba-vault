# Required status check: "lint"  (ESLint + TypeScript type-check)
name: lint

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: lint-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
      # Regenerate lockfile on Linux before install — see build.yml (npm/cli#4828).
      - run: rm -f package-lock.json && npm install --no-audit --no-fund
      - run: npm run lint
      - run: npm run typecheck
