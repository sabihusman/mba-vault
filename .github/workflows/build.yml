# Required status check: "build"  (matched by the BARE job id below, not "build / build")
name: build

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
      # `npm install`, not `npm ci`: deps like @tailwindcss/oxide ship per-OS native
      # binaries and our lockfile is generated on Windows. `npm install` re-resolves the
      # correct Linux binary on the runner; `npm ci` only installs what's already locked.
      - run: npm install --no-audit --no-fund
      - run: npm run build
