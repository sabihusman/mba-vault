# Required status check: "build"  (matched by the BARE job id below, not "build / build")
name: build

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
      # Regenerate the lockfile on the Linux runner before installing. Our committed
      # lockfile is generated on Windows, and npm omits other platforms' native binaries
      # for nested optional deps (npm/cli#4828) — e.g. @tailwindcss/oxide's Linux binary.
      # `npm install` alone won't backfill it; removing the lockfile first forces a clean
      # Linux resolution. (Phase 2: a Docker-generated Linux lockfile lets us use `npm ci`.)
      - run: rm -f package-lock.json && npm install --no-audit --no-fund
      - run: npm run build
